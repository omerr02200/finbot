services:

  postgres:
    image: postgres:16-alpine
    container_name: finbot-postgres
    environment:
      POSTGRES_DB: finbot
      POSTGRES_USER: finbot
      POSTGRES_PASSWORD: finbot123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finbot-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: finbot-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finbot-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: finbot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: finbot
      RABBITMQ_DEFAULT_PASS: finbot123

volumes:
  postgres_data:

user-service:
  build: ./user-service
  container_name: finbot-user-service
  ports:
    - "8080-8080"
  depends_on:
    - postgres
    - redis
    - kafka
    - rabbitmq
  environment:
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finbot
    SPRING_DATASOURCE_USERNAME: finbot
    SPRING_DATASOURCE_PASSWORD: finbot123
    SPRING_REDIS_HOST: redis
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    SPRING_RABBITMQ_HOST: rabbitmq
    SPRING_RABBITMQ_PASSWORD: finbot123
    JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    GEMINI_API_KEY: {GEMINI_API_KEY}

analytics-service:
  build: ./analytics-service
  container_name: finbot-analytics-service
  ports:
    - "8081:8081"
  depends_on:
    - postgres
    - kafka
  environment:
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finbot
    SPRING_DATASOURCE_USERNAME: finbot
    SPRING_DATASOURCE_PASSWORD: finbot123
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

notification-service:
  build: ./notification-service
  container_name: finbot-notification-service
  ports:
    - "8082:8082"
  depends_on:
    - rabbitmq
  environment:
    SPRING_RABBITMQ_HOST: rabbitmq
    SPRING_RABBITMQ_USERNAME: finbot
    SPRING_RABBITMQ_PASSWORD: finbot123