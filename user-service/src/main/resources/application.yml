spring:
  application:
    name: user-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finbot}
    username: ${SPRING_DATASOURCE_USERNAME:finbot}
    password: ${SPRING_DATASOURCE_PASSWORD:finbot123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        spring.json.add.type.headers: false
    bootstrap-servers: ${SPRING_KAFKA_BOOTSRAP_SERVERS:localhost:9092}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:finbot}
    password: ${SPRING_RABBITMQ_PASSWORD:finbot123}

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always
